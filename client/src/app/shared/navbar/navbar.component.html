<header
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 will-change-transform"
  [ngClass]="{
    'bg-primary/80 backdrop-blur-md shadow-card py-4': isScrolled(), 
    'py-6 bg-transparent': !isScrolled()
  }"
  [style.box-shadow]="isScrolled() ? '0 4px 24px rgba(0, 0, 0, 0.4), inset 0 -1px 0 0 rgba(6, 182, 212, 0.15)' : 'none'"
>
  <div class="container-custom flex justify-between items-center">
    <!-- Logo -->
    <a routerLink="/" class="text-xl font-bold text-text-primary flex items-center gap-2 group">
      <span class="text-accent">&lt;</span>
      <span class="group-hover:text-accent transition-colors duration-300">developerPapai</span>
      <span class="text-accent">/&gt;</span>
    </a>

    <!-- Desktop Nav -->
    <nav class="hidden md:flex items-center gap-8">
      <a routerLink="/" fragment="about" class="nav-link">About</a>
      <a routerLink="/" fragment="skills" class="nav-link">Skills</a>
      <a routerLink="/projects" class="nav-link" routerLinkActive="active">Projects</a>
      <a routerLink="/" fragment="contact" class="nav-link">Contact</a>
      <a *ngIf="resumeUrl" [href]="resumeUrl" target="_blank" class="btn-outline px-4 py-2 text-xs">Resume</a>
    </nav>

    <!-- Mobile Menu Toggle -->
    <button class="md:hidden text-text-primary text-2xl" (click)="toggleMenu()">
      <svg *ngIf="!menuOpen()" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
      <svg *ngIf="menuOpen()" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- Mobile Menu -->
  <div
    class="fixed inset-[73px_0_0_0] bg-primary/95 backdrop-blur-xl z-40 transition-all duration-300 md:hidden flex flex-col items-center justify-center gap-8 text-xl"
    [ngClass]="{'opacity-100 visible h-screen': menuOpen(), 'opacity-0 invisible h-0': !menuOpen()}"
  >
    <a routerLink="/" fragment="about" (click)="toggleMenu()" class="nav-link">About</a>
    <a routerLink="/" fragment="skills" (click)="toggleMenu()" class="nav-link">Skills</a>
    <a routerLink="/projects" (click)="toggleMenu()" class="nav-link" routerLinkActive="active">Projects</a>
    <a routerLink="/" fragment="contact" (click)="toggleMenu()" class="nav-link">Contact</a>
    <a *ngIf="resumeUrl" [href]="resumeUrl" target="_blank" class="btn-primary mt-4">Resume</a>
  </div>
</header>
