<div class="min-h-screen flex items-center justify-center bg-primary p-4">
  <div class="card w-full max-w-md p-8 pt-10">
    <div class="text-center mb-8">
      <div class="text-3xl font-bold text-text-primary mb-2 flex justify-center items-center gap-2">
        <span class="text-accent">&lt;</span>
        <span>Admin</span>
        <span class="text-accent">/&gt;</span>
      </div>
      <p class="text-text-muted">Sign in to manage your portfolio</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-text-muted mb-2">Email</label>
        <input type="email" formControlName="email" class="input-field">
        <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="text-danger text-xs mt-1">Valid email is required</div>
      </div>

      <div>
        <label class="block text-sm font-medium text-text-muted mb-2">Password</label>
        <input type="password" formControlName="password" class="input-field" >
      </div>

      <div *ngIf="error" class="bg-danger/10 text-danger border border-danger/20 rounded p-3 text-sm">
        {{ error }}
      </div>

      <button type="submit" [disabled]="loginForm.invalid || loading" class="btn-primary w-full justify-center">
        <span *ngIf="loading" class="animate-spin inline-block mr-2"><i class="fas fa-circle-notch"></i></span>
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>
  </div>
</div>
