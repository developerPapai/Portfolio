<div class="max-w-4xl mx-auto">
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-bold">Profile Customization</h1>
  </div>

  <div *ngIf="isLoading" class="flex justify-center p-12">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-accent"></div>
  </div>

  <form *ngIf="!isLoading" [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="bg-card border border-border rounded-xl shadow-card overflow-hidden">
    <div class="p-6 md:p-8 space-y-6">
      
      <div class="grid md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-text-muted mb-2">Full Name</label>
          <input type="text" formControlName="name" class="w-full px-4 py-3 rounded-lg bg-secondary border border-border-subtle text-text-primary outline-none focus:border-accent transition-colors">
        </div>
        <div>
          <label class="block text-sm font-medium text-text-muted mb-2">Professional Title</label>
          <input type="text" formControlName="title" class="w-full px-4 py-3 rounded-lg bg-secondary border border-border-subtle text-text-primary outline-none focus:border-accent transition-colors">
        </div>
      </div>

      <div class="grid md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-text-muted mb-2">Static Hero Tagline</label>
          <input type="text" formControlName="heroTagline" class="w-full px-4 py-3 rounded-lg bg-secondary border border-border-subtle text-text-primary outline-none focus:border-accent transition-colors" placeholder="e.g. Building things that live on the internet">
        </div>
        <div>
          <label class="block text-sm font-medium text-text-muted mb-2">Rotating Taglines (One per line)</label>
          <textarea formControlName="heroTaglines" rows="1" class="w-full px-4 py-3 rounded-lg bg-secondary border border-border-subtle text-text-primary outline-none focus:border-accent transition-colors resize-y" placeholder="Enter one tagline per line..."></textarea>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-text-muted mb-2">Bio</label>
        <textarea formControlName="bio" rows="4" class="w-full px-4 py-3 rounded-lg bg-secondary border border-border-subtle text-text-primary outline-none focus:border-accent transition-colors resize-none"></textarea>
      </div>

      <div class="grid md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-text-muted mb-2">Email Address</label>
          <input type="email" formControlName="email" class="w-full px-4 py-3 rounded-lg bg-secondary border border-border-subtle text-text-primary outline-none focus:border-accent transition-colors">
        </div>
        <div>
          <label class="block text-sm font-medium text-text-muted mb-2">Phone Number</label>
          <input type="text" formControlName="phone" class="w-full px-4 py-3 rounded-lg bg-secondary border border-border-subtle text-text-primary outline-none focus:border-accent transition-colors">
        </div>
        <div>
          <label class="block text-sm font-medium text-text-muted mb-2">Location</label>
          <input type="text" formControlName="location" class="w-full px-4 py-3 rounded-lg bg-secondary border border-border-subtle text-text-primary outline-none focus:border-accent transition-colors">
        </div>
        <div>
          <label class="block text-sm font-medium text-text-muted mb-2">Years of Experience</label>
          <input type="number" formControlName="yearsOfExperience" class="w-full px-4 py-3 rounded-lg bg-secondary border border-border-subtle text-text-primary outline-none focus:border-accent transition-colors">
        </div>
      </div>

      <div class="h-px w-full bg-border my-8"></div>

      <h3 class="text-xl font-bold mb-4">Social Links</h3>
      <div class="grid md:grid-cols-3 gap-6">
        <div>
          <label class="block text-sm font-medium text-text-muted mb-2">GitHub URL</label>
          <input type="text" formControlName="github" class="w-full px-4 py-3 rounded-lg bg-secondary border border-border-subtle text-text-primary outline-none focus:border-accent transition-colors">
        </div>
        <div>
          <label class="block text-sm font-medium text-text-muted mb-2">LinkedIn URL</label>
          <input type="text" formControlName="linkedin" class="w-full px-4 py-3 rounded-lg bg-secondary border border-border-subtle text-text-primary outline-none focus:border-accent transition-colors">
        </div>
        <div>
          <label class="block text-sm font-medium text-text-muted mb-2">Twitter URL</label>
          <input type="text" formControlName="twitter" class="w-full px-4 py-3 rounded-lg bg-secondary border border-border-subtle text-text-primary outline-none focus:border-accent transition-colors">
        </div>
      </div>

      <div class="flex items-center gap-3 mt-6">
        <input type="checkbox" id="availableForWork" formControlName="availableForWork" class="w-5 h-5 accent-accent">
        <label for="availableForWork" class="text-sm font-medium text-text-primary">Currently Available for Work</label>
      </div>
    </div>
    
    <div class="bg-secondary p-6 border-t border-border flex justify-end gap-4">
      <button type="submit" [disabled]="isSaving || profileForm.invalid" class="bg-accent text-black px-6 py-2 rounded font-bold hover:bg-accent/90 disabled:opacity-50 transition-colors">
        {{ isSaving ? 'Saving...' : 'Save Profile' }}
      </button>
    </div>
  </form>
</div>
