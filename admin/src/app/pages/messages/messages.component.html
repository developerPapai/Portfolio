<div class="max-w-4xl mx-auto">
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-bold">Messages</h1>
  </div>

  <div *ngIf="isLoading" class="flex justify-center p-12">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-accent"></div>
  </div>

  <div *ngIf="!isLoading && messages.length === 0" class="bg-card border border-border rounded-xl p-12 text-center text-text-muted">
    No messages found.
  </div>

  <div *ngIf="!isLoading && messages.length > 0" class="space-y-4">
    <div *ngFor="let msg of messages" class="bg-card border rounded-xl p-6 transition-all" [ngClass]="msg.read ? 'border-border' : 'border-accent shadow-[0_0_15px_rgba(6,182,212,0.15)]'">
      <div class="flex justify-between items-start mb-4">
        <div>
          <h3 class="text-lg font-bold flex items-center gap-2">
            {{ msg.name }} 
            <span *ngIf="!msg.read" class="bg-accent text-black text-xs px-2 py-0.5 rounded font-bold uppercase tracking-wider">New</span>
          </h3>
          <p class="text-text-muted text-sm">{{ msg.email }}</p>
        </div>
        <div class="flex items-start gap-4">
          <div class="text-right">
            <p class="text-text-muted text-xs mb-1">{{ msg.createdAt | date:'medium' }}</p>
            <div class="flex items-center gap-3">
              <button *ngIf="!msg.read" (click)="markAsRead(msg._id)" class="text-accent text-sm hover:underline">Mark read</button>
              <button (click)="replyByEmail(msg)" class="text-success text-sm hover:underline flex items-center gap-1">
                <span>Reply</span>
              </button>
              <button (click)="deleteMessage(msg._id)" class="text-danger text-sm hover:underline">Delete</button>
            </div>
          </div>
        </div>
      </div>
      
      <div class="bg-secondary p-4 rounded-lg mt-4 border border-border-subtle">
        <p class="text-sm font-semibold mb-2" *ngIf="msg.subject">Subject: {{ msg.subject }}</p>
        <p class="text-text-primary whitespace-pre-wrap leading-relaxed">{{ msg.message }}</p>
      </div>
    </div>
  </div>
</div>
