<div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
  <div class="bg-primary border border-border rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col">
    
    <div class="p-6 border-b border-border flex justify-between items-center">
      <h2 class="text-2xl font-bold">{{ project ? 'Edit Project' : 'Add Project' }}</h2>
      <button (click)="onClose()" class="text-text-muted hover:text-text-primary text-xl">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="p-6 overflow-y-auto flex-grow">
      <form [formGroup]="projectForm" id="projectForm" (ngSubmit)="onSubmit()" class="space-y-6">
        
        <div class="grid grid-cols-2 gap-4">
          <div class="col-span-2 sm:col-span-1">
            <label class="block text-sm font-medium text-text-muted mb-2">Title *</label>
            <input type="text" formControlName="title" class="w-full px-4 py-2 rounded-lg bg-secondary border border-border-subtle text-text-primary outline-none focus:border-accent">
          </div>
          <div class="col-span-2 sm:col-span-1">
            <label class="block text-sm font-medium text-text-muted mb-2">Category *</label>
            <select formControlName="category" class="w-full px-4 py-2 rounded-lg bg-secondary border border-border-subtle text-text-primary outline-none focus:border-accent">
              <option value="frontend">Frontend</option>
              <option value="backend">Backend</option>
              <option value="fullstack">Fullstack</option>
              <option value="mobile">Mobile</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-text-muted mb-2">Short Description *</label>
          <textarea formControlName="description" rows="2" class="w-full px-4 py-2 rounded-lg bg-secondary border border-border-subtle text-text-primary outline-none focus:border-accent resize-none"></textarea>
        </div>

        <div>
          <label class="block text-sm font-medium text-text-muted mb-2">Long Description</label>
          <textarea formControlName="longDescription" rows="4" class="w-full px-4 py-2 rounded-lg bg-secondary border border-border-subtle text-text-primary outline-none focus:border-accent resize-y"></textarea>
        </div>

        <div>
          <label class="block text-sm font-medium text-text-muted mb-2">Tech Stack (comma separated)</label>
          <input type="text" formControlName="techStack" placeholder="Angular, Node.js, MongoDB" class="w-full px-4 py-2 rounded-lg bg-secondary border border-border-subtle text-text-primary outline-none focus:border-accent">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div class="col-span-2 sm:col-span-1">
            <label class="block text-sm font-medium text-text-muted mb-2">GitHub URL</label>
            <input type="url" formControlName="githubUrl" class="w-full px-4 py-2 rounded-lg bg-secondary border border-border-subtle text-text-primary outline-none focus:border-accent">
          </div>
          <div class="col-span-2 sm:col-span-1">
            <label class="block text-sm font-medium text-text-muted mb-2">Live URL</label>
            <input type="url" formControlName="liveUrl" class="w-full px-4 py-2 rounded-lg bg-secondary border border-border-subtle text-text-primary outline-none focus:border-accent">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-text-muted mb-2">Project Image</label>
          <div class="flex items-start gap-4">
            <div *ngIf="previewUrl" class="w-32 h-32 rounded-lg border border-border-subtle overflow-hidden bg-secondary flex-shrink-0">
              <img [src]="previewUrl" class="w-full h-full object-cover">
            </div>
            <div *ngIf="!previewUrl" class="w-32 h-32 rounded-lg border border-border-subtle bg-secondary flex flex-col items-center justify-center text-text-muted flex-shrink-0">
              <i class="fas fa-image text-2xl mb-1"></i>
              <span class="text-xs">No Image</span>
            </div>
            
            <div class="flex-grow">
              <div class="relative group h-32 border-2 border-dashed border-border-subtle rounded-lg flex flex-col items-center justify-center hover:border-accent transition-colors cursor-pointer overflow-hidden">
                <input type="file" (change)="onFileSelected($event)" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                <i class="fas fa-cloud-upload-alt text-2xl text-text-muted mb-2 group-hover:text-accent transition-colors"></i>
                <span class="text-sm font-medium text-text-muted group-hover:text-accent transition-colors">
                  {{ selectedFile ? selectedFile.name : 'Choose system image' }}
                </span>
                <p class="text-xs text-text-muted mt-1">PNG, JPG up to 5MB</p>
              </div>
            </div>
          </div>
          <input type="hidden" formControlName="imageUrl">
        </div>

        <div class="flex gap-6">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" formControlName="featured" class="w-4 h-4 accent-accent">
            <span class="text-sm font-medium">Featured Project</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" formControlName="visible" class="w-4 h-4 accent-accent">
            <span class="text-sm font-medium">Visible to Public</span>
          </label>
        </div>

      </form>
    </div>

    <div class="p-6 border-t border-border flex justify-end gap-4 bg-secondary/50 rounded-b-xl">
      <button type="button" (click)="onClose()" class="px-6 py-2 rounded font-medium text-text-primary hover:bg-white/5 transition-colors">Cancel</button>
      <button type="submit" form="projectForm" [disabled]="projectForm.invalid || isUploading" class="bg-accent text-black px-6 py-2 rounded font-bold hover:bg-accent/90 disabled:opacity-50 transition-colors flex items-center gap-2">
        <i *ngIf="isUploading" class="fas fa-spinner fa-spin"></i>
        {{ isUploading ? 'Uploading...' : (project ? 'Update' : 'Create') + ' Project' }}
      </button>
    </div>

  </div>
</div>
