<ng-container *ngIf="isLoginPage; else dashboardLayout">
  <router-outlet></router-outlet>
</ng-container>

<ng-template #dashboardLayout>
  <div class="flex h-screen overflow-hidden bg-primary text-text-primary">

    <!-- Mobile Backdrop -->
    <div 
      *ngIf="menuOpen" 
      (click)="toggleMenu()" 
      class="fixed inset-0 bg-black/50 z-40 md:hidden backdrop-blur-sm"
    ></div>

    <!-- Sidebar -->
    <aside 
      class="fixed inset-y-0 left-0 z-50 w-64 bg-secondary border-r border-border transform transition-transform duration-300 ease-in-out md:relative md:translate-x-0 flex flex-col"
      [class.-translate-x-full]="!menuOpen"
    >
      <div class="p-6 border-b border-border flex items-center justify-between">
        <div class="text-xl font-bold flex items-center gap-2">
          <span class="text-accent">&lt;</span>
          <span>Papai</span>
          <span class="text-accent">/&gt;</span>
        </div>
        <span class="text-[10px] uppercase font-bold tracking-wider text-text-muted bg-primary px-2 py-1 rounded">Admin</span>
        <button (click)="toggleMenu()" class="md:hidden text-text-muted hover:text-text-primary">
          <i class="fas fa-times text-lg"></i>
        </button>
      </div>

      <nav class="flex-grow p-4 space-y-2 overflow-y-auto">
        <a routerLink="/" routerLinkActive="bg-accent/10 border-l-2 border-accent text-accent" [routerLinkActiveOptions]="{exact: true}" class="flex items-center gap-3 px-4 py-3 rounded-r-lg text-text-muted hover:bg-accent/5 hover:text-text-primary transition-colors border-l-2 border-transparent">
          <i class="fas fa-home w-5"></i> Dashboard
        </a>
        <a routerLink="/projects" routerLinkActive="bg-accent/10 border-l-2 border-accent text-accent" class="flex items-center gap-3 px-4 py-3 rounded-r-lg text-text-muted hover:bg-accent/5 hover:text-text-primary transition-colors border-l-2 border-transparent">
          <i class="fas fa-project-diagram w-5"></i> Projects
        </a>
        <a routerLink="/skills" routerLinkActive="bg-accent/10 border-l-2 border-accent text-accent" class="flex items-center gap-3 px-4 py-3 rounded-r-lg text-text-muted hover:bg-accent/5 hover:text-text-primary transition-colors border-l-2 border-transparent">
          <i class="fas fa-code w-5"></i> Skills
        </a>
        <a routerLink="/messages" routerLinkActive="bg-accent/10 border-l-2 border-accent text-accent" class="flex items-center gap-3 px-4 py-3 rounded-r-lg text-text-muted hover:bg-accent/5 hover:text-text-primary transition-colors border-l-2 border-transparent">
          <i class="fas fa-envelope w-5"></i> Messages
        </a>
        <a routerLink="/profile" routerLinkActive="bg-accent/10 border-l-2 border-accent text-accent" class="flex items-center gap-3 px-4 py-3 rounded-r-lg text-text-muted hover:bg-accent/5 hover:text-text-primary transition-colors border-l-2 border-transparent">
          <i class="fas fa-user w-5"></i> Profile
        </a>
      </nav>

      <div class="p-4 border-t border-border">
        <button (click)="logout()" class="flex items-center gap-3 px-4 py-3 w-full rounded text-text-muted hover:text-danger hover:bg-danger/10 transition-colors text-left">
          <i class="fas fa-sign-out-alt w-5"></i> Logout
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-grow flex flex-col h-full overflow-hidden">
      <!-- Mobile Header -->
      <header class="bg-secondary border-b border-border h-16 flex items-center justify-between px-4 md:hidden sticky top-0 z-30">
        <div class="text-lg font-bold flex items-center gap-2">
          <span class="text-accent">&lt;</span>
          <span>Papai</span>
          <span class="text-accent">/&gt;</span>
        </div>
        <button (click)="toggleMenu()" class="text-text-primary p-2">
          <i class="fas fa-bars text-xl"></i>
        </button>
      </header>

      <!-- Content Area -->
      <main class="flex-grow overflow-y-auto p-4 md:p-8 bg-primary">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
</ng-template>
